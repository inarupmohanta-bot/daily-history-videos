name: Daily Animated Video

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --break-system-packages google-genai edge-tts pillow requests \
            google-auth-oauthlib google-api-python-client

      - name: Generate video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_video.py

      - name: Upload to YouTube
        env:
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: python upload_youtube.py

      - name: Publish video to GitHub Release (for public URL)
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="video-$(date +%Y%m%d-%H%M%S)"
          FILE=$(ls output/*.mp4)
          gh release create "$TAG" "$FILE" --title "$TAG" --notes "Daily video"
          URL=$(gh release view "$TAG" --json assets -q '.assets[0].browser_download_url')
          echo "video_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Upload to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          VIDEO_PUBLIC_URL: ${{ steps.release.outputs.video_url }}
        run: python upload_instagram.py

      - name: Upload generated video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-video
          path: output/
